name: Run Notebooks

on:
  pull_request:
    branches: [main]

jobs:
  run-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt nbconvert ipykernel

      - name: Run all notebooks
        run: |
          for notebook in notebooks/*.ipynb; do
            jupyter nbconvert --to notebook --execute "$notebook" --output /tmp/output.ipynb
          done
